name: Feature request
description: Suggest an improvement for the classroom app or maintainer workflow
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or classroom need
      description: What learner, teacher, accessibility, privacy, or maintenance need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and safety considerations
      description: Confirm whether this keeps all student data local and avoids fixed-personality/ranking language.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or examples
      description: Use synthetic examples only; do not include real student data.
