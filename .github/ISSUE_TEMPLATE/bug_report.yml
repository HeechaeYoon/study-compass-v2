name: Bug report
description: Report a reproducible problem with Study Compass V2
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Do not include real student data. Use fixture or synthetic data only.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps, viewport, and route if relevant.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: Chrome 126 on Windows 11
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Access gate
        - Questionnaire
        - Scoring/result
        - AI prompt generation
        - Save/delete/localStorage
        - Clipboard/image export
        - Visual layout
        - Accessibility
        - Deployment
        - Documentation
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Attach screenshots or logs with synthetic data only.
